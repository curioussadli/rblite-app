<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stok</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/stok.css">
  <link rel="stylesheet" href="css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div id="toast"></div>



<!-- =========================
     CALCULATOR
========================= -->
<div id="calculator" class="calc-overlay">

  <div class="calc-box">

    <!-- 🔥 CLOSE MELAYANG -->
    <button class="calc-close" onclick="toggleCalculator()">✕</button>

    <input type="text" id="calcDisplay" readonly>

    <div class="calc-buttons">

      <!-- ROW 1 -->
      <button onclick="calcClear()">C</button>
      <button onclick="calcPercent()">%</button>
      <button onclick="calcDelete()">←</button>
      <button onclick="calcInput('/')">/</button>

      <!-- ROW 2 -->
      <button onclick="calcInput('7')">7</button>
      <button onclick="calcInput('8')">8</button>
      <button onclick="calcInput('9')">9</button>
      <button onclick="calcInput('*')">×</button>

      <!-- ROW 3 -->
      <button onclick="calcInput('4')">4</button>
      <button onclick="calcInput('5')">5</button>
      <button onclick="calcInput('6')">6</button>
      <button onclick="calcInput('-')">-</button>

      <!-- ROW 4 -->
      <button onclick="calcInput('1')">1</button>
      <button onclick="calcInput('2')">2</button>
      <button onclick="calcInput('3')">3</button>
      <button onclick="calcInput('+')">+</button>

      <!-- ROW 5 -->
      <button onclick="calcInput('00')">00</button>
      <button onclick="calcInput('0')">0</button>
      <button onclick="calcInput('.')">,</button>
      <button onclick="calcEqual()">=</button>

    </div>

  </div>

</div>




<!-- =========================
     TOPBAR
========================= -->
<div class="topbar">
  <div class="topbar-title">Stok</div>

  <div class="topbar-action" onclick="toggleCalculator()">
    <img src="assets/icons/icon-calculator.svg" alt="calc">
  </div>

  <div class="topbar-action" onclick="toggleFilter(this)">
    <img src="assets/icons/icon-list-x.svg" class="filter-icon" alt="filter">
  </div>

</div>





<!-- =========================
     MAIN CONTENT
========================= -->
<section class="stok-main">



<div class="stok-search">
  <img src="assets/icons/icon-search.svg" class="search-icon">

  <input 
    type="text" 
    id="searchInput" 
    placeholder="Cari produk..."
    oninput="handleSearch(this.value)"
  >
</div>
  

  <!-- LIST PRODUK -->
  <div id="stokContainer"></div>

  <!-- BUTTON SIMPAN HARIAN -->
  <div class="stok-footer">
    <button onclick="window.simpanHarian()">
      Simpan Stok Harian
    </button>
  </div>

<!-- <input type="file" onchange="importCSV(this.files[0])"> -->


</section>
